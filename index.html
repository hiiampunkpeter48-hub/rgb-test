<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>顏色辨識器</title>
</head>
<body>

<h1>RGB-TEST</h1>


<video
id="camera"
autoplay
playsinline
width="300">
</video>


<canvas
id="canvas"
width="320"
height="240"
style="display:none;">
</canvas>


<h2 id="result">
等待辨識...
</h2>



<script>

navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:"environment"
    }
})
.then(function(stream){

    video.srcObject = stream;

})
.catch(function(error){

    alert(error.name);

});




const video =
document.getElementById("camera");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const result =
document.getElementById("result");




setInterval(function(){

    ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    let pixel =
    ctx.getImageData(
        160,
        120,
        1,
        1
    );

    let r = pixel.data[0];
    let g = pixel.data[1];
    let b = pixel.data[2];

    let signal =
    detectColor(r,g,b);

    result.innerHTML =
    `
    R:${r}<br>
    G:${g}<br>
    B:${b}<br><br>

    訊號:${signal}
    `;

},500);




function detectColor(r,g,b){

    if(r > 200 && g < 50 && b < 50)
    {
        return "A";
    }

    if(r < 50 && g < 160 && b > 150)
    {
        return "B";
    }

    if(r > 200 && g > 200 && b < 50)
    {
        return "C";
    }

    if(r < 50 && g > 130 && b < 130)
    {
        return "D";
    }

    return "未知";
}



let signal =
detectColor(r,g,b);

result.innerHTML =
`
RGB:

${r}
${g}
${b}

<br><br>

訊號:

${signal}
`;







</script>

</body>
</html>

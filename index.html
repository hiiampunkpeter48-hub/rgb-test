<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>顏色辨識器</title>
</head>
<body>

<h1>我的第一個App</h1>

<video
id="camera"
autoplay
playsinline
width="300">
</video>

<script>

const video =
document.getElementById("camera");

navigator.mediaDevices.getUserMedia({
    video:true
})
.then(function(stream){

    video.srcObject = stream;

})
.catch(function(error){

    alert("鏡頭開啟失敗");

});

</script>

</body>
</html>

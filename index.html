<!DOCTYPE html>

<html>
<head>

<!-- 網頁使用 UTF-8 編碼，避免中文亂碼 -->
<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<!-- 瀏覽器頁籤標題 -->
<title>顏色辨識器</title>

</head>

<body>

<!-- 網頁標題 -->

<h1>RGB-TEST</h1>

<h2>
Version 2026-06-27 21:34
</h2>


<style>

#cameraBox{

    position:relative;

    width:100%;

}

#camera{

    width:100%;

    display:block;

}

#targetBox{

    position:absolute;

    width:50px;
    height:50px;

    border:3px solid red;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    pointer-events:none;
}

</style>


<!-- 紅框校準 -->
<div id="cameraBox">

    <video
    id="camera"
    autoplay
    playsinline>
    </video>

<div id="targetBox"></div>

</div>




<!--
    顯示色塊
-->
<div
id="colorPreview"
style="
width:120px;
height:120px;
border:1px solid black;
margin:10px auto;
">
</div>


<!--
    Canvas 畫布

    用途：
    把鏡頭畫面複製進來

    然後讀取像素顏色

    display:none
    隱藏畫布
    使用者看不到
-->

<canvas
id="canvas"
width="320"
height="240"
style="display:none;"> </canvas>








<!--
    顯示 RGB 與辨識結果
-->

<h2 id="result">
等待辨識...
</h2>

<script>

//
// 取得 HTML 元件
//

const video =
document.getElementById("camera");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const result =
document.getElementById("result");


// 等待鏡頭資訊載入完成，Canvas尺寸=真實鏡頭尺寸
video.addEventListener(
    "loadedmetadata",
    function(){

        canvas.width =
        video.videoWidth;

        canvas.height =
        video.videoHeight;

        console.log(
            "Canvas尺寸:",
            canvas.width,
            canvas.height
        );

    }
);




//
// 開啟手機後鏡頭
//

navigator.mediaDevices.getUserMedia({

    video:{

        // 使用後鏡頭
        facingMode:"environment"

    }

})

.then(function(stream){

    // 將鏡頭畫面放到 video 元件
    video.srcObject = stream;

})

.catch(function(error){

    // 開啟失敗顯示錯誤
    alert(error.name);

});



//
// 每 500 毫秒執行一次
//
// 500ms = 0.5秒
//
// 目的：
// 持續分析鏡頭畫面
//

setInterval(function(){

    //
    // 將目前鏡頭畫面
    // 畫到 Canvas
    //

    ctx.drawImage(

        video,

        0,
        0,

        canvas.width,
        canvas.height

    );




//
// 取得中央 50×50 區域平均 RGB，同步紅框
//

const boxSize = 50;

document.getElementById("targetBox").style.width =
boxSize + "px";

document.getElementById("targetBox").style.height =
boxSize + "px";



// 中央座標
const centerX =
Math.floor(canvas.width / 2);

const centerY =
Math.floor(canvas.height / 2);


// 取得中央區域
const imageData =
ctx.getImageData(

    centerX - boxSize / 2,
    centerY - boxSize / 2,

    boxSize,
    boxSize

);


// RGB總和
let totalR = 0;
let totalG = 0;
let totalB = 0;


// 每個像素格式:
// [R,G,B,A]
for(
    let i = 0;
    i < imageData.data.length;
    i += 4
)
{
    totalR += imageData.data[i];
    totalG += imageData.data[i + 1];
    totalB += imageData.data[i + 2];
}


// 總像素數
const pixelCount =
boxSize * boxSize;


// 平均RGB
let r =
Math.round(totalR / pixelCount);

let g =
Math.round(totalG / pixelCount);

let b =
Math.round(totalB / pixelCount);




    //
    // 呼叫顏色辨識函式
    //

    let signal =
    detectColor(r,g,b);

// 顯示一個色塊
document.getElementById("colorPreview").style.backgroundColor =
`rgb(${r},${g},${b})`;

    //
    // 顯示結果
    //
    result.innerHTML =
    `
分析區域:${boxSize}×${boxSize}<br><br>

    R:${r}<br>
    G:${g}<br>
    B:${b}<br><br>

    訊號:${signal}
    `;

},100);




//
// 顏色判斷函式
//
// 傳入：
// r,g,b
//
// 回傳：
// A、B、C、D
//

function detectColor(r,g,b){

    //
    // 黃色
    // (優先判斷)
    //
    if(
        r > 120 &&
        g > 120 &&
        b < 100
    )
    {
        return "C  黃色";
    }

    //
    // 紅色
    //
    if(
        r > g + 30 &&
        r > b + 30
    )
    {
        return "A  紅色";
    }

    //
    // 藍色
    //
    if(
        b > r + 30 &&
        b > g + 30
    )
    {
        return "B  藍色";
    }

    //
    // 綠色
    //
    if(
        g > r + 30 &&
        g > b + 30
    )
    {
        return "D  綠色";
    }

    //
    // 都不符合
    //
    return "未知";
}




</script>

</body>
</html>

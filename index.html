<!DOCTYPE html>

<html>
<head>

```
<!-- 網頁使用 UTF-8 編碼，避免中文亂碼 -->
<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<!-- 瀏覽器頁籤標題 -->
<title>顏色辨識器</title>
```

</head>

<body>

<!-- 網頁標題 -->

<h1>RGB-TEST</h1>

<h2>
Version 2026-06-27 20:32
</h2>


<style>

#cameraBox{

    position:relative;

    width:100%;

}

#camera{

    width:100%;

    display:block;

}

#targetBox{

    position:absolute;

    width:50px;
    height:50px;

    border:3px solid red;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    pointer-events:none;
}

</style>





<!-- 紅框校準 -->
<div id="cameraBox">

    <video
    id="camera"
    autoplay
    playsinline>
    </video>

    <div id="targetBox"></div>

</div>


<!--
    顯示手機鏡頭畫面

    id="camera"
    讓 JavaScript 可以找到這個 video 元件

    autoplay
    自動播放鏡頭

    playsinline
    避免手機全螢幕播放

    width="100%"
    寬度永遠填滿螢幕
    高度自動維持比例
-->

<video
id="camera"
autoplay
playsinline
style="
width:100%;
max-width:100%;
height:auto;
">
</video>

<!--
    Canvas 畫布

    用途：
    把鏡頭畫面複製進來

    然後讀取像素顏色

    display:none
    隱藏畫布
    使用者看不到
-->

<canvas
id="canvas"
width="320"
height="240"
style="display:none;"> </canvas>


<!--
    Canvas尺寸=真實鏡頭尺寸
-->
video.addEventListener(
    "loadedmetadata",
    function(){

        canvas.width =
        video.videoWidth;

        canvas.height =
        video.videoHeight;

    }
);





<!--
    顯示 RGB 與辨識結果
-->

<h2 id="result">
等待辨識...
</h2>

<script>

//
// 取得 HTML 元件
//

const video =
document.getElementById("camera");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const result =
document.getElementById("result");



//
// 開啟手機後鏡頭
//

navigator.mediaDevices.getUserMedia({

    video:{

        // 使用後鏡頭
        facingMode:"environment"

    }

})

.then(function(stream){

    // 將鏡頭畫面放到 video 元件
    video.srcObject = stream;

})

.catch(function(error){

    // 開啟失敗顯示錯誤
    alert(error.name);

});



//
// 每 500 毫秒執行一次
//
// 500ms = 0.5秒
//
// 目的：
// 持續分析鏡頭畫面
//

setInterval(function(){

    //
    // 將目前鏡頭畫面
    // 畫到 Canvas
    //

    ctx.drawImage(

        video,

        0,
        0,

        canvas.width,
        canvas.height

    );



    //
    // 取得中央像素
    //
    // x = 160
    // y = 120
    //

    let pixel =
    ctx.getImageData(

        160,
        120,

        1,
        1

    );



    //
    // pixel.data:
    //
    // [R,G,B,A]
    //
    // A = Alpha(透明度)
    //

    let r = pixel.data[0];
    let g = pixel.data[1];
    let b = pixel.data[2];



    //
    // 呼叫顏色辨識函式
    //

    let signal =
    detectColor(r,g,b);


    //
    // 顯示結果
    //
    result.innerHTML =
    `
    R:${r}<br>
    G:${g}<br>
    B:${b}<br><br>

    訊號:${signal}
    `;

},100);




//
// 顏色判斷函式
//
// 傳入：
// r,g,b
//
// 回傳：
// A、B、C、D
//

function detectColor(r,g,b){

    //
    // 黃色
    // (優先判斷)
    //
    if(
        r > 120 &&
        g > 120 &&
        b < 100
    )
    {
        return "C  黃色";
    }

    //
    // 紅色
    //
    if(
        r > g + 30 &&
        r > b + 30
    )
    {
        return "A  紅色";
    }

    //
    // 藍色
    //
    if(
        b > r + 30 &&
        b > g + 30
    )
    {
        return "B  藍色";
    }

    //
    // 綠色
    //
    if(
        g > r + 30 &&
        g > b + 30
    )
    {
        return "D  綠色";
    }

    //
    // 都不符合
    //
    return "未知";
}



</script>

</body>
</html>
